<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
  <meta property="og:image" content="images/img_social_og.jpg" />
  <title>FH Liquidation Auction Tool</title>
  <!-- Bootstrap core CSS -->
  <link href="css/ddscss.css" rel="stylesheet">
  <!-- Favicons -->
  <link rel="apple-touch-icon" href="images/touch-icon.png">
  <link rel="icon" href="favicon.ico">
</head>
<body>
  <div class="d-flex align-items-center h-100 overflow-auto">
    <div class="container">
      <form>
        <div class="row justify-content-center">
          <div class="col-12 mt-5 mb-4">
            <div class="p-3 p-sm-5 mx-auto login-box border rounded-4">
              <div class="text-center mb-3">
                <img src="images/logo.png" alt="FH Liquidation Auction Tool">
              </div>
              <div class="text-center my-5">
                <h1 class="mb-0">Welcome back!</h1>
                <small>Login to continue</small>
              </div>
              <div class="mb-3">
                <label class="mb-2" for="email">Email<span class="text-danger">*</span></label>
                <input id="email" type="text" class="form-control px-2" name="email" value="" autocomplete="email"
                  autofocus="">
                <div class="errormessage" role="alert">The email field is required.</div>
              </div>
              <div class="mb-3">
                <label class="mb-2" for="password">Pin<span class="text-danger">*</span></label>
                <div class="pin">
                  <input id="password" type="password" class="form-control px-2 " name="password"
                    autocomplete="current-password" data-validator="required">
                  <img src="images/pin.png" alt="pin" class="hand-point">
                  <!-- <img src="images/pin-off.png" alt="pin" class="hand-point"> Conditional image hide/show-->
                </div>
                <div class="errormessage" role="alert">The pin field is required.</div>
              </div>
              <div class="mb-3">
                <button type="submit" class="btn btn-primary col-12">
                  Login
                </button>
              </div>
            </div>
          </div>
        </div>
      </form>
      <div class="row">
        <div class="col-12 text-center pb-3 copy-rgt">
          Copyright © 2024 FH Liquidation Auction Tool All Rights Reserved.<br>
          Powered by <a class="text-decoration-none" href="https://www.devdigital.com/" target="_blank"
            rel="noopener">Navam Tech</a>

        </div>
      </div>
    </div>
  </div>
  <script src="js/bootstrap.bundle.min.js"></script>
  <script src="js/jquery-3.4.1.min.js"></script>
</body>

</html>
