<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
  <meta property="og:image" content="images/img_social_og.jpg" />
  <title>FH Liquidation Auction Tool</title>
  <!-- Bootstrap core CSS -->
  <link href="css/ddscss.css" rel="stylesheet">
  <!-- Favicons -->
  <link rel="apple-touch-icon" href="images/touch-icon.png">
  <link rel="icon" href="favicon.ico">
</head>

<body>
  <div class="d-flex align-items-center h-100 overflow-auto">
    <div class="container">
      <div class="row justify-content-center text-center">
        <div class="col-12 mt-5 mb-4">
          <img src="images/404.png" alt="error">
          <div class="mt-4">
            <strong><a class="f20 btn btn-primary" href="javascript:void(0)">Back to Home</a></strong>
          </div>
        </div>
        <div class="col-12">
          <button type="button" class="btn btn-primary" id="liveToastBtn">Show live toast</button>
          <div class="toast-container position-fixed top-0 end-0 p-3">
            <div id="liveToast" class="toast" role="alert" aria-live="assertive" aria-atomic="true">
              <div class="toast-body d-flex align-items-center justify-content-between text-white bg-primary">
                Hello, world! This is a toast message.
                <button type="button" class="btn-close text-white float-end" data-bs-dismiss="toast" aria-label="Close"></button>
              </div>
            </div>
          </div>
          <!-- <div class="toast align-items-center" role="alert" aria-live="assertive" aria-atomic="true">
              <div class="d-flex">
                <div class="toast-body">
                  Hello, world! This is a toast message.
                </div>
                <button type="button" class="btn-close me-2 m-auto" data-bs-dismiss="toast" aria-label="Close"></button>
              </div>
            </div> -->

        </div>
      </div>
    </div>
  </div>
  <script src="js/bootstrap.bundle.min.js"></script>
  <script src="js/jquery-3.4.1.min.js"></script>
  <script src="js/snippets.js"></script>
  <script>
    const toastTrigger = document.getElementById('liveToastBtn')
    const toastLiveExample = document.getElementById('liveToast')

    if (toastTrigger) {
      const toastBootstrap = bootstrap.Toast.getOrCreateInstance(toastLiveExample)
      toastTrigger.addEventListener('click', () => {
        toastBootstrap.show()
      })
    }
  </script>
</body>

</html>
